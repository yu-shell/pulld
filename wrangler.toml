name = "pulld"
pages_build_output_dir = "public"
compatibility_date = "2026-01-01"

# D1 database for the fetch log (referenced as env.DB by functions/r/[[path]].js)
[[d1_databases]]
binding = "DB"
database_name = "pulld"
database_id = "ff110676-b940-4295-a2e3-3043f041af1b"

# Workers AI (embeddings) — env.AI
[ai]
binding = "AI"

# Vector index for pulld Search (semantic search) — env.VEC
[[vectorize]]
binding = "VEC"
index_name = "pulld-search"

# Polar billing (non-secret ids). Secrets (POLAR_WEBHOOK_SECRET, POLAR_ACCESS_TOKEN) are set via
# `wrangler pages secret put`, not here.
[vars]
POLAR_ORG_ID = "9030a633-a030-47e9-96b4-73d62f89efc9"
POLAR_SEARCH_PRODUCT_IDS = "284512c9-e164-4ce4-8c31-814b88fdc9c9"
POLAR_PRO_PRODUCT_IDS = "6b4e677f-dc20-4093-bcc8-6ea16e104cdd"
