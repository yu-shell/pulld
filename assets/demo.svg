<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" width="760" height="440" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1a1a2e" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- page -->
  <rect width="760" height="440" rx="18" fill="#f4f4f6"/>
  <!-- brand -->
  <rect x="40" y="34" width="22" height="22" rx="6" fill="#6d5efc"/>
  <text x="72" y="51" font-size="19" font-weight="700" fill="#1a1a1a" letter-spacing="-0.3">pulld</text>
  <text x="724" y="51" text-anchor="end" font-size="13" fill="#6b6b6b">components your AI agent installs by itself</text>

  <!-- command palette modal -->
  <g filter="url(#sh)">
    <rect x="140" y="92" width="480" height="300" rx="16" fill="#ffffff" stroke="#e7e7e4"/>
  </g>
  <!-- input -->
  <text x="166" y="135" font-size="16" fill="#1a1a1a">let users switch to dark mode</text>
  <rect x="372" y="121" width="2" height="19" fill="#6d5efc"/>
  <rect x="586" y="118" width="22" height="22" rx="6" fill="#f4f4f2" stroke="#e7e7e4"/>
  <text x="597" y="134" text-anchor="middle" font-size="11" fill="#6b6b6b" font-family="ui-monospace,monospace">⌘K</text>
  <line x1="140" y1="156" x2="620" y2="156" stroke="#e7e7e4"/>

  <!-- result 1 (active) -->
  <rect x="150" y="166" width="460" height="48" rx="9" fill="#6d5efc"/>
  <text x="166" y="187" font-size="14.5" font-weight="600" fill="#ffffff">Theme Toggle</text>
  <text x="166" y="204" font-size="12" fill="#e7e3ff">Light/dark toggle — persists to localStorage, respects OS preference</text>
  <text x="600" y="194" text-anchor="end" font-size="11" fill="#cdc6ff">0.68</text>

  <!-- result 2 -->
  <text x="166" y="243" font-size="14.5" font-weight="600" fill="#1a1a1a">Password Input</text>
  <text x="166" y="260" font-size="12" fill="#6b6b6b">Password field with a built-in show/hide toggle</text>
  <text x="600" y="250" text-anchor="end" font-size="11" fill="#9a9aa2">0.50</text>

  <!-- result 3 -->
  <text x="166" y="295" font-size="14.5" font-weight="600" fill="#1a1a1a">Command Palette</text>
  <text x="166" y="312" font-size="12" fill="#6b6b6b">⌘K palette with keyboard nav, fuzzy filter, async source</text>
  <text x="600" y="302" text-anchor="end" font-size="11" fill="#9a9aa2">0.46</text>

  <!-- footer -->
  <line x1="140" y1="344" x2="620" y2="344" stroke="#e7e7e4"/>
  <text x="166" y="372" font-size="11.5" fill="#6b6b6b">powered by <tspan font-weight="700" fill="#6d5efc">pulld Search</tspan> · semantic, not keyword · ↑↓ navigate · ↵ jump · esc</text>
</svg>
